<!DOCTYPE html>
<html lang="id" data-theme="pink">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a Birthday Gift 🧸</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- ROOT VARIABEL WARNA TEMATIK --- */
        [data-theme="pink"] {
            --bg-color: #fceae6; --box-bg: #fff8f6; --border-color: #c05c57;
            --text-main: #5c2522; --text-accent: #8c322e; --btn-bg: #f7e1d7;
            --btn-border: #e8b9ae; --btn-hover: #eed2c4; --cake-layer: #e8b9ae;
        }
        [data-theme="blue"] {
            --bg-color: #e2f0f9; --box-bg: #f5f9fc; --border-color: #5b90b8;
            --text-main: #1f3d54; --text-accent: #164f7a; --btn-bg: #d1e5f3;
            --btn-border: #b7d4ea; --btn-hover: #bedbf1; --cake-layer: #b7d4ea;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background-color 0.3s, border-color 0.3s; }
        body { background-color: var(--bg-color); font-family: 'Fredoka', sans-serif; color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; position: relative; padding: 20px; }

        /* --- SAKELAR TEMA --- */
        .theme-toggle { position: fixed; top: 20px; right: 20px; z-index: 100; background-color: var(--btn-bg); border: 2px solid var(--btn-border); color: var(--text-main); padding: 8px 16px; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Fredoka', sans-serif; }
        .theme-toggle:hover { transform: scale(1.03); background-color: var(--btn-hover); }

        /* --- HIASAN SUDUT --- */
        .decor { position: fixed; font-size: 26px; z-index: 5; pointer-events: none; opacity: 0.7; animation: bounceEffect 3s infinite alternate; }
        .icon-1 { top: 30px; left: 30px; } .icon-2 { top: 80px; left: 40px; } .icon-3 { bottom: 30px; left: 30px; } .icon-4 { bottom: 30px; right: 30px; }

        /* --- STRUKTUR WADAH --- */
        .bday-page { display: none; width: 100%; max-width: 500px; animation: fadeIn 0.4s forwards; }
        .bday-page.active { display: block; }
        .bday-box { background-color: var(--box-bg); border: 3px dashed var(--border-color); border-radius: 30px; padding: 35px 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); position: relative; }

        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .w-100 { width: 100%; }

        .bear-header { font-size: 55px; margin-bottom: 10px; }
        .bday-subtitle { font-size: 14px; font-weight: 600; color: var(--border-color); letter-spacing: 1.5px; }
        .bday-name { font-size: 26px; color: var(--text-accent); margin: 10px 0 20px; line-height: 1.3; }
        .bday-greet { font-family: 'Quicksand', sans-serif; font-size: 14px; line-height: 1.5; }

        /* --- STYLE FORM INPUT --- */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: var(--text-accent); }
        .form-group input, .form-group textarea { width: 100%; padding: 10px 15px; border: 2px solid var(--btn-border); background-color: #fff; border-radius: 15px; font-family: 'Quicksand', sans-serif; font-size: 13px; color: #333; outline: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--border-color); }

        .btn-bday-cream { background-color: var(--btn-bg); color: var(--text-main); border: 2px solid var(--btn-border); font-family: 'Fredoka', sans-serif; font-size: 15px; font-weight: 600; padding: 10px 24px; border-radius: 50px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border-style: solid; text-decoration: none; }
        .btn-bday-cream:hover { background-color: var(--btn-hover); transform: scale(1.03); }

        .btn-bday-back { position: absolute; top: 20px; left: 20px; background-color: var(--btn-bg); border: 2px solid var(--btn-border); color: var(--text-main); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .section-title { color: var(--text-accent); font-size: 22px; }

        /* --- INTERAKTIF KUE --- */
        .cake-container { width: 150px; height: 120px; margin: 30px auto 20px; position: relative; cursor: pointer; }
        .cake-layer { background-color: var(--cake-layer); border-radius: 10px 10px 0 0; position: absolute; left: 50%; transform: translateX(-50%); border: 2px solid var(--border-color); }
        .layer-bottom { width: 150px; height: 50px; bottom: 0; background-color: var(--btn-bg); }
        .layer-top { width: 110px; height: 45px; bottom: 48px; }
        .candle { width: 10px; height: 35px; background-color: var(--text-accent); position: absolute; top: -5px; left: 50%; transform: translateX(-50%); border-radius: 4px; }
        .flame { width: 14px; height: 20px; background-color: #ff9d00; border-radius: 50% 50% 20% 20%; position: absolute; top: -22px; left: 50%; transform: translateX(-50%); animation: flicker 0.6s infinite alternate; }
        .cake-instruction { font-size: 13px; color: var(--border-color); font-weight: 600; }

        /* --- POLAROID --- */
        .polaroid-frame { background: white; padding: 12px 12px 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); transform: rotate(-1.5deg); width: 85%; margin: 0 auto 20px; border: 1px solid #eee; }
        .polaroid-img { width: 100%; height: 180px; object-fit: cover; border-radius: 4px; }
        .polaroid-text { font-family: 'Caveat', cursive; font-size: 20px; margin-top: 10px; color: #333; }

        /* --- SURAT & FOOTER --- */
        .bday-letter { text-align: left; font-family: 'Quicksand', sans-serif; font-size: 14px; line-height: 1.6; background: white; padding: 20px; border-radius: 18px; border: 1px solid var(--btn-border); margin-bottom: 20px; color: #444; white-space: pre-line; }
        .bday-spotify a { display: inline-block; background-color: var(--bg-color); color: var(--text-accent); padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: 700; font-size: 13px; margin-bottom: 15px; }
        .bday-footer { font-family: 'Caveat', cursive; font-size: 24px; color: var(--text-accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounceEffect { 0% { transform: translateY(0); } 100% { transform: translateY(-6px); } }
        @keyframes flicker { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.15); } }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">
        <span id="theme-icon">🌸</span> Ganti Tema
    </button>

    <div class="decor icon-1" id="dec-1">🌸</div>
    <div class="decor icon-2" id="dec-2">✨</div>
    <div class="decor icon-3" id="dec-3">🌷</div>
    <div class="decor icon-4" id="dec-4">✨</div>

    <div class="bday-page" id="view-gift-page">
        <div id="dynamic-content"></div>
    </div>
